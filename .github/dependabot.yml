version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    groups:
      svelte:
        patterns:
          - '@sveltejs/*'
          - 'svelte'
          - 'svelte-check'
      dev-tools:
        patterns:
          - 'prettier*'
          - 'typescript'
          - 'vite'
          - '@tailwindcss/*'
          - 'tailwindcss'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5

  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
